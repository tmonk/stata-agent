name: Build & Test

on:
  push:
    branches:
      - '*'
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-fast:
    name: Fast tests (py3.14, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: |
          uv sync --python 3.14 --all-extras --dev
        timeout-minutes: 10

      - name: Run fast tests (unit, parallelised — excludes fuzz tests which use random parametrisation)
        run: |
          uv run pytest -v -n auto -m "fast and not requires_stata" --ignore=tests/unit/test_mock_backend_fuzz.py --cov --cov-report=term-missing
        timeout-minutes: 5

      - name: Run fuzz tests (sequential — random parametrisation prevents xdist)
        run: |
          uv run pytest -v -m "fast and not requires_stata" tests/unit/test_mock_backend_fuzz.py --cov --cov-append --cov-report=term-missing
        timeout-minutes: 5

      - name: Build package
        run: |
          uv build
        timeout-minutes: 5

      - name: Test installation in clean environment
        shell: bash
        run: |
          uv run python -m venv test_venv
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            source test_venv/Scripts/activate
          else
            source test_venv/bin/activate
          fi
          pip install dist/*.whl
          python -c "
          import importlib.resources
          import importlib.metadata
          import stata_agent
          _v = importlib.metadata.version('stata-agent')
          print(f'[OK] Import successful (v{_v})')
          p = importlib.resources.files('stata_agent') / 'plugin'
          print(f'[OK] Plugin dir: {p}')
          assert p.is_dir(), 'Plugin directory missing from wheel'
          skills = list((p / 'skills').iterdir())
          print(f'[OK] Skills: {[s.name for s in skills]}')
          "
          command -v stata-agent
          echo "[OK] Entry point installed"
        timeout-minutes: 10

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ matrix.os }}-py3.14
          path: |
            dist/
            *.log
          retention-days: 7

  test-slow:
    name: Slow / integration tests (py3.14, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: |
          uv sync --python 3.14 --all-extras --dev
        timeout-minutes: 10

      - name: Run slow / integration tests (not requiring Stata)
        env:
          STATA_AGENT_MOCK: 1
        run: |
          uv run pytest -v -m "not benchmark and not requires_stata and not fast" --cov --cov-append --cov-report=term-missing
        timeout-minutes: 10

      - name: Upload build artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: slow-test-artifacts-${{ matrix.os }}
          path: |
            *.log
          retention-days: 7


